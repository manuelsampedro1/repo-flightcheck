name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint
        run: node scripts/lint.js
      - name: Build preflight
        run: node scripts/build.js
      - name: Run tests
        run: node --test
      - name: Dogfood the CLI
        run: node bin/repo-flightcheck.js . --strict --threshold 80
